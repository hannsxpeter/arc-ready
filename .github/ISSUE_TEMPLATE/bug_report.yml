name: Bug report
description: Something in arc-ready is broken or behaves unexpectedly.
title: "[bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing. Please fill in the sections below so the maintainer can reproduce.
        For security issues, do NOT use this template - see SECURITY.md for the private channel.
  - type: input
    id: version
    attributes:
      label: arc-ready version
      description: The value of `metadata.version` in SKILL.md. Required.
      placeholder: "1.1.0"
    validations:
      required: true
  - type: dropdown
    id: harness
    attributes:
      label: Harness
      description: Which AI coding harness loaded the skill?
      options:
        - Claude Code
        - Codex CLI
        - Cursor
        - Windsurf
        - Antigravity
        - Pi
        - OpenClaw
        - Generic chat frontend (no file system)
        - Other (please specify in description)
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      description: Which arc-ready mode were you in?
      options:
        - "A (full arc, greenfield)"
        - "B (specific tier, existing codebase)"
        - "C (retroactive audit)"
        - "D (multi-repo suite layout)"
        - "Unsure"
    validations:
      required: true
  - type: dropdown
    id: tier
    attributes:
      label: Tier where the bug fired
      options:
        - "Tier 0 (orchestration)"
        - "Tier 1.1 (PRD)"
        - "Tier 1.2 (architecture)"
        - "Tier 1.3 (roadmap)"
        - "Tier 1.4 (stack)"
        - "Tier 2.1 (repo)"
        - "Tier 2.2 (production / app)"
        - "Tier 3.1 (deploy)"
        - "Tier 3.2 (observe)"
        - "Tier 3.3 (launch)"
        - "Tier 3.4 (harden)"
        - "Cross-tier or unsure"
    validations:
      required: true
  - type: dropdown
    id: project_form
    attributes:
      label: Primary project form
      options:
        - Web application
        - API or service
        - CLI or SDK
        - Mobile or desktop
        - Data or ML
        - Infrastructure or IaC
        - Not applicable or unsure
    validations:
      required: true
  - type: input
    id: domain_composition
    attributes:
      label: Domain composition
      description: Product archetype, industry overlay, and regulatory overlay, if applicable.
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps to reproduce the bug. Concrete is better than abstract.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: PROGRESS.md excerpt, agent transcript snippet, anything that helps.
