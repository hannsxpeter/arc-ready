name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  lint:
    name: meta-linter
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run lint
        run: bash scripts/lint.sh --all --verbose
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
