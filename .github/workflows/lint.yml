name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  verify:
    name: meta-linter
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Install pinned official validator
        run: python -m pip install -r requirements/skills-ref.txt

      - name: Check Bash syntax
        run: bash -n scripts/*.sh

      - name: Run full repository lint
        run: SKILLS_REF_BIN="$(command -v skills-ref)" bash scripts/lint.sh --all --verbose

      - name: Run dogfood smoke test
        run: bash scripts/dogfood-smoke.sh --verbose

      - name: Run deterministic evaluations
        run: bash scripts/eval.sh --verbose

      - name: Run official Agent Skills validation
        run: skills-ref validate "$GITHUB_WORKSPACE"

      - name: Check tag-release parity
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: bash scripts/lint.sh tag-release-parity --verbose
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
